<!DOCTYPE html>
<html>
<head>
  <title>Inventory App Web UI</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #2c3e50;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .section {
      margin-bottom: 40px;
      padding-bottom: 25px;
      border-bottom: 1px solid #e0e0e0;
    }

    .section h2 {
      margin-bottom: 15px;
      color: #34495e;
    }

    input {
      margin: 6px 0;
      padding: 10px;
      width: 100%;
      max-width: 350px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 10px 18px;
      margin-top: 12px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    button:hover {
      background: #2980b9;
    }

    pre {
      background: #2d3436;
      color: #ecf0f1;
      padding: 20px;
      border-radius: 8px;
      font-size: 14px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<h1>Inventory App Web UI</h1>

<div class="container">

<script>
  const BASE_URL = "https://467cu18ekg.execute-api.us-east-1.amazonaws.com/dev";

  async function viewInventory() {
    try {
      const res = await fetch(`${BASE_URL}/item`);
      const data = await res.json();
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      document.getElementById("output").textContent = "Error loading inventory.";
    }
  }

  async function addItem() {
    const item = {
      item_name: document.getElementById("add-name").value,
      item_qty_on_hand: document.getElementById("add-quantity").value,
      item_price: document.getElementById("add-price").value,
      item_description: document.getElementById("add-description").value,
      item_location_id: document.getElementById("add-location").value
    };

    try {
      const res = await fetch(`${BASE_URL}/item`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(item)
      });

      const data = await res.json();
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      document.getElementById("output").textContent = "Error adding item.";
    }
  }

  async function deleteItem() {
    const id = document.getElementById("delete-id").value;

    try {
      const res = await fetch(`${BASE_URL}/item/${id}`, {
        method: "DELETE"
      });

      const data = await res.json();
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      document.getElementById("output").textContent = "Error deleting item.";
    }
  }
</script>

<div class="section">
  <h2>View Inventory</h2>
  <button onclick="viewInventory()">Load Inventory</button>
</div>

<div class="section">
  <h2>Add New Item</h2>
  <input id="add-name" placeholder="Item Name"><br>
  <input id="add-quantity" placeholder="Quantity On Hand"><br>
  <input id="add-price" placeholder="Price"><br>
  <input id="add-description" placeholder="Description"><br>
  <input id="add-location" placeholder="Location ID"><br>
  <button onclick="addItem()">Add Item</button>
</div>

<div class="section">
  <h2>Delete Item</h2>
  <input id="delete-id" placeholder="Item ID"><br>
  <button onclick="deleteItem()">Delete Item</button>
</div>

<h2>Output</h2>
<pre id="output"></pre>

</div>

</body>
</html>
